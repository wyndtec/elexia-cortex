apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: cortex-infra
  labels:
    app.kubernetes.io/name: vault-init
    app.kubernetes.io/component: initialization
spec:
  # Remover o Job automaticamente 5 minutos após conclusão
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-init-sa
      # NOTA: imagem hashicorp/vault NÃO inclui kubectl. Usamos bitnami/kubectl
      # que inclui curl, kubectl e jq para inicializar via HTTP API + salvar Secret.
      containers:
        - name: vault-init
          image: bitnami/kubectl:1.29
          env:
            - name: VAULT_ADDR
              value: "http://vault-0.vault-internal.cortex-infra.svc.cluster.local:8200"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Aguardando Vault API estar disponível..."
              until curl -sf "${VAULT_ADDR}/v1/sys/health" > /dev/null 2>&1 || \
                    curl -sf "${VAULT_ADDR}/v1/sys/health" 2>&1 | grep -q "initialized"; do
                echo "Vault ainda não disponível, aguardando 5s..."
                sleep 5
              done

              # Verificar se já foi inicializado via HTTP API
              INIT_STATUS=$(curl -sf "${VAULT_ADDR}/v1/sys/init" | grep -o '"initialized":[^,}]*' | cut -d: -f2 | tr -d ' ')
              if [ "${INIT_STATUS}" = "true" ]; then
                echo "Vault já inicializado, pulando."
                exit 0
              fi

              echo "Inicializando Vault via HTTP API (auto-unseal via KMS)..."
              # recovery-shares/threshold para auto-unseal KMS (não são unseal keys manuais)
              INIT_OUTPUT=$(curl -sf \
                --request POST \
                --data '{"recovery_shares":5,"recovery_threshold":3}' \
                "${VAULT_ADDR}/v1/sys/init")

              if [ -z "${INIT_OUTPUT}" ]; then
                echo "ERRO: Vault init retornou resposta vazia" >&2
                exit 1
              fi

              ROOT_TOKEN=$(echo "${INIT_OUTPUT}" | grep -o '"root_token":"[^"]*"' | cut -d'"' -f4)

              if [ -z "${ROOT_TOKEN}" ]; then
                echo "ERRO: root_token não encontrado na resposta de init" >&2
                exit 1
              fi

              echo "Salvando credenciais em Secret Kubernetes (TTL: deletar imediatamente após uso)..."
              kubectl create secret generic vault-init-keys \
                --from-literal=root-token="${ROOT_TOKEN}" \
                --from-literal=init-output="${INIT_OUTPUT}" \
                --namespace=cortex-infra \
                --dry-run=client -o yaml | kubectl apply -f -

              # ---------------------------------------------------------------
              # SEGURANÇA: Bootstrap mínimo com root token — configurar auth
              # methods e policies via API antes de revogar.
              # Em produção, adicionar aqui os comandos de bootstrap (AppRole,
              # PKI, políticas de acesso) e então revogar o root token:
              #
              #   VAULT_TOKEN="${ROOT_TOKEN}" vault auth enable approle
              #   VAULT_TOKEN="${ROOT_TOKEN}" vault policy write <name> <path>
              #   VAULT_TOKEN="${ROOT_TOKEN}" vault token revoke "${ROOT_TOKEN}"
              #
              # O root token NÃO deve existir além do tempo de bootstrap.
              # Referência: https://developer.hashicorp.com/vault/docs/concepts/tokens#root-tokens
              # ---------------------------------------------------------------

              # AVISO CRÍTICO: O Secret vault-init-keys contém o root token em
              # base64 (NÃO criptografado). Deve ser deletado imediatamente após
              # extrair e armazenar o token em local seguro (ex: cofre offline).
              #
              #   kubectl delete secret vault-init-keys -n cortex-infra
              #
              # Se o etcd do cluster NÃO tiver encryption-at-rest habilitado,
              # o root token está exposto no disco do nó control-plane.
              echo ""
              echo "====================================================================="
              echo " ACAO OBRIGATORIA: delete o Secret apos salvar o root token:"
              echo "   kubectl delete secret vault-init-keys -n cortex-infra"
              echo " Em producao: revogar root token apos bootstrap de auth methods."
              echo "====================================================================="
              echo "Vault inicializado com sucesso."
      volumes: []
---
# ServiceAccount com permissão mínima para criar Secrets no namespace cortex-infra
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-init-sa
  namespace: cortex-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-init-role
  namespace: cortex-infra
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-init-rolebinding
  namespace: cortex-infra
subjects:
  - kind: ServiceAccount
    name: vault-init-sa
    namespace: cortex-infra
roleRef:
  kind: Role
  name: vault-init-role
  apiGroup: rbac.authorization.k8s.io
