# =============================================================================
# GitHub Actions: Infra Deploy
# Fluxo: plan (PR) → apply (push main) → deploy EKS manifests + Helm
#
# Autenticação AWS via OIDC — sem credenciais de longa duração em secrets.
# Pré-requisito: role IAM criada pelo módulo iam/ com trust policy apontando
# para este repositório e branch.
#
# Secrets necessários no GitHub (Settings → Secrets and variables → Actions):
#   AWS_ROLE_ARN: ARN da role GitHub Actions (output do Terraform)
#   AWS_REGION:   sa-east-1
#   EKS_CLUSTER_NAME: elexia-cortex-demo
# =============================================================================

name: Infra Deploy

on:
  push:
    branches:
      - main
    paths:
      # Só executa quando há mudanças em infra/
      - "infra/**"
      - ".github/workflows/infra-deploy.yml"
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/infra-deploy.yml"

# Impede execuções concorrentes que possam corromper o state
concurrency:
  group: infra-deploy-${{ github.ref }}
  cancel-in-progress: false  # false: não cancela apply em andamento

permissions:
  contents: read
  # id-token: necessário para OIDC com AWS
  id-token: write
  # pull-requests: para postar resultado do plan como comentário no PR
  pull-requests: write

env:
  TERRAFORM_VERSION: "1.7.5"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_WORKING_DIR: infra/terraform/aws/environments/demo

jobs:
  # ===========================================================================
  # Job 1: Terraform Validate + Plan
  # Roda em todo PR e push para main
  # ===========================================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    outputs:
      # Passa o exitcode do plan para o job apply decidir se há mudanças
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # OIDC: autentica na AWS sem credenciais de longa duração (AC5)
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Duração da sessão: 1h (suficiente para plan + apply)
          role-session-name: github-actions-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init -input=false

      - name: Terraform Validate
        run: |
          terraform validate

      - name: Terraform Format Check
        run: |
          terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -detailed-exitcode \
            -out=tfplan \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        # exitcode 0 = sem mudanças, 1 = erro, 2 = mudanças detectadas

      # Salva o plan para uso no job apply (apenas em push para main)
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

      # Posta resultado do plan como comentário no PR
      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan-output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (truncado — ver logs completos no Actions)'
              : planOutput;
            const body = `## Terraform Plan — Ambiente Demo\n\n\`\`\`terraform\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ===========================================================================
  # Job 2: Terraform Apply
  # Roda apenas em push para main (não em PRs)
  # ===========================================================================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    # Só aplica se estiver na main E houver mudanças no plan (exitcode=2)
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.terraform-plan.outputs.plan_exitcode == '2'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init -input=false

      # Baixa o plan gerado no job anterior (evita re-gerar com estado diferente)
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve tfplan

  # ===========================================================================
  # Job 3: Deploy Kubernetes manifests + Helm
  # Roda após Terraform Apply bem-sucedido
  # ===========================================================================
  k8s-deploy:
    name: Deploy Kubernetes
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: needs.terraform-apply.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-k8s-${{ github.run_id }}

      # Gera o kubeconfig usando aws eks update-kubeconfig
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      # Aplica namespaces antes do Ingress Controller
      - name: Apply Kubernetes namespaces
        run: |
          kubectl apply -f infra/kubernetes/namespaces/cortex-demo.yaml
          kubectl apply -f infra/kubernetes/namespaces/cortex-prod.yaml

      # Instala/atualiza NGINX Ingress Controller via Helm
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Add ingress-nginx Helm repo
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

      - name: Deploy NGINX Ingress Controller
        run: |
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --values infra/kubernetes/ingress/nginx-values.yaml \
            --wait \
            --timeout 5m0s

      # Verifica que o LB do Ingress recebeu um IP/hostname externo
      - name: Verify Ingress Controller
        run: |
          echo "Aguardando LoadBalancer receber hostname externo..."
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s
          kubectl get service ingress-nginx-controller -n ingress-nginx
